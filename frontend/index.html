  <style>

    /* в”Җв”Җ ж»ҡеҠЁжқЎ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

<body>

<script>
// в”Җв”Җ е·Ҙе…·еҮҪж•° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function now() {
  return new Date().toLocaleTimeString('zh-CN', {hour12: false});
}

function addLog(msg, type = 'system') {
  const panel = document.getElementById('log-panel');
  const entry = document.createElement('div');

  // ж №жҚ®ж—Ҙеҝ—еҶ…е®№иҮӘеҠЁеҲӨж–ӯзұ»еһӢ
  let cls = type;
  if (msg.includes('[Planner]'))  cls = 'planner';
  else if (msg.includes('[Router]')) cls = 'router';
  else if (msg.includes('[ToolAgent]') || msg.includes('[Tool]')) cls = 'tool';
  else if (msg.includes('[RAGAgent]') || msg.includes('[RAG]'))  cls = 'rag';
  else if (msg.includes('[ReportAgent]')) cls = 'report';

  entry.className = `log-entry ${cls}`;
  entry.innerHTML = `<span class="time">${now()}</span><span class="msg">${escapeHtml(msg)}</span>`;
  panel.appendChild(entry);
  panel.scrollTop = panel.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// з®ҖеҚ• Markdown жёІжҹ“
function renderMarkdown(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,    '<em>$1</em>')
    .replace(/`(.+?)`/g,      '<code>$1</code>')
    .replace(/^- (.+)$/gm,    '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/^> (.+)$/gm,    '<blockquote>$1</blockquote>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[h|u|b|o|l|p])/gm, '')
    || text;
}

function setStatusDot(state) {
  const dot = document.getElementById('status-dot');
  dot.className = `status-dot ${state}`;
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

function renderPlan(plan) {
  const container = document.getElementById('plan-list');
  container.innerHTML = plan.map((t, i) => `
    <div class="task-item" id="task-${t.id}">
      <div class="task-header">
        <span style="color:#718096; font-size:0.7rem;">д»»еҠЎ ${i + 1}</span>
        <div style="display:flex; gap:6px; align-items:center;">
          <span class="task-agent ${t.agent}">${t.agent}</span>
          <span class="task-status ${t.status}"></span>
        </div>
      </div>
      <div class="task-desc">${escapeHtml(t.description)}</div>
    </div>
  `).join('');
}

function setExample(btn) {
  document.getElementById('query-input').value = btn.textContent.trim();
}

// в”Җв”Җ ж ёеҝғжү§иЎҢйҖ»иҫ‘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function runTask() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) { alert('иҜ·иҫ“е…Ҙд»»еҠЎеҶ…е®№'); return; }

  // йҮҚзҪ®з•Ңйқў
  document.getElementById('log-panel').innerHTML = '';
  document.getElementById('plan-list').innerHTML = '<div style="color:#4a5568; font-size:0.82rem;">и§„еҲ’дёӯ...</div>';
  document.getElementById('report-placeholder').style.display = 'flex';
  document.getElementById('report-content').style.display = 'none';
  document.getElementById('run-btn').disabled = true;

  setStatusDot('running');
  setStatus('жӯЈеңЁиҝһжҺҘ Agent зі»з»ҹ...');
  addLog('д»»еҠЎе·ІжҸҗдәӨпјҢжӯЈеңЁеҗҜеҠЁ Agent жөҒж°ҙзәҝ...', 'system');

  // е»әз«Ӣ WebSocket иҝһжҺҘ
  const wsUrl = `ws://${location.host}/ws/run`;
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus('Agent зі»з»ҹе·ІиҝһжҺҘпјҢејҖе§Ӣжү§иЎҢ...');
    ws.send(JSON.stringify({ query }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'log':
        addLog(msg.data);
        break;

      case 'plan':
        renderPlan(msg.data);
        setStatus(`д»»еҠЎи®ЎеҲ’е·Із”ҹжҲҗ (${msg.data.length} дёӘеӯҗд»»еҠЎ)`);
        break;

      case 'report':
        document.getElementById('report-placeholder').style.display = 'none';
        const rc = document.getElementById('report-content');
        rc.style.display = 'block';
        rc.innerHTML = `<div>${renderMarkdown(msg.data)}</div>`;
        break;

      case 'done':
        setStatusDot('');  // з»ҝиүІзЁіе®ҡ
        setStatus('жүҖжңүд»»еҠЎжү§иЎҢе®ҢжҲҗ вң“');
        addLog('вң“ д»»еҠЎжөҒж°ҙзәҝжү§иЎҢе®ҢжҜ•', 'system');
        document.getElementById('run-btn').disabled = false;
        ws.close();
        break;

      case 'error':
        setStatusDot('idle');
        setStatus(`й”ҷиҜҜ: ${msg.data}`);
        addLog(`вң— й”ҷиҜҜ: ${msg.data}`, 'system');
        document.getElementById('run-btn').disabled = false;
        break;
    }
  };

  ws.onerror = () => {
    setStatusDot('idle');
    setStatus('WebSocket иҝһжҺҘеӨұиҙҘ');
    addLog('вң— ж— жі•иҝһжҺҘеҲ°еҗҺз«ҜжңҚеҠЎпјҢиҜ·зЎ®и®ӨжңҚеҠЎе·ІеҗҜеҠЁ', 'system');
    document.getElementById('run-btn').disabled = false;
  };

  ws.onclose = () => {
    if (document.getElementById('run-btn').disabled) {
      // жӯЈеёёе…ій—ӯдёҚеҒҡеӨ„зҗҶ
    }
  };
}

// еӣһиҪҰ + Ctrl+Enter жҸҗдәӨ
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('query-input').addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') runTask();
  });
});
</script>
